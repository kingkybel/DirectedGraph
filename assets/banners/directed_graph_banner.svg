<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Directed Graph Utilities banner">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#529D94" />
      <stop offset="100%" stop-color="#467E77" />
    </linearGradient>
    <marker id="arrowHead" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.7 L6,2.5 L1,4.3 Z" fill="#0C372C" stroke="#FFFFFF" stroke-width="0.5" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="400" fill="url(#bgGradient)" />
  <circle cx="300" cy="300" r="180" fill="#546433" fill-opacity="0.13" />

  <text x="90" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700" fill="#ECFDF5">
    Directed Graph Utilities
  </text>
  <text x="93" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#D1FAE5">
    A light wrapper around boost-graph-library
  </text>

  <circle cx="1260" cy="200" r="150" fill="#559E84" stroke="#8391AE" stroke-width="4" />

  <g fill="#083734" stroke="#0C372C" stroke-width="3">
    <circle cx="1165" cy="145" r="12" />
    <circle cx="1270" cy="130" r="12" />
    <circle cx="1365" cy="175" r="12" />
    <circle cx="1215" cy="245" r="12" />
    <circle cx="1345" cy="255" r="12" />
    <circle cx="1275" cy="315" r="12" />
  </g>

  <g stroke="#0C372C" stroke-width="4" fill="none" marker-end="url(#arrowHead)">
    <line x1="1165" y1="145" x2="1270" y2="130" />
    <line x1="1270" y1="130" x2="1365" y2="175" />
    <line x1="1165" y1="145" x2="1215" y2="245" />
    <line x1="1215" y1="245" x2="1345" y2="255" />
    <line x1="1270" y1="130" x2="1215" y2="245" />
    <line x1="1345" y1="255" x2="1365" y2="175" />
    <line x1="1365" y1="175" x2="1275" y2="315" />
    <line x1="1215" y1="245" x2="1275" y2="315" />
